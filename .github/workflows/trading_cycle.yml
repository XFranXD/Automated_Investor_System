name: Trading Cycle

on:
  schedule:
    # Schedule runs ~5 times daily during market hours Monday-Friday (UTC-4 DST / UTC-5 Standard)
    # Approximate ET times (under DST / UTC-4): 9:45 AM, 11:15 AM, 12:45 PM, 2:15 PM, 3:45 PM
    - cron: '45 13 * * 1-5'
    - cron: '15 15 * * 1-5'
    - cron: '45 16 * * 1-5'
    - cron: '15 18 * * 1-5'
    - cron: '45 19 * * 1-5'
  workflow_dispatch: # Allows manual trigger

jobs:
  run-trading-cycle:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Trading Cycle
      env:
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
        FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
      run: python trading_cycle_placeholder.py

